name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  EMSDK_VERSION: '4.0.7'

jobs:
  # Build the WASM module via emsdk + cmake.
  wasm-build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Verify toolchain
        run: |
          emcc --version | head -n1
          cmake --version | head -n1

      - name: Build WASM
        working-directory: wasm
        run: npm run build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: wasm/pkg/
          retention-days: 1

  # TypeScript linting (uses the prebuilt WASM artifact).
  ts-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm/pkg/

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:js

      - name: Check Prettier formatting
        run: npm run format:check

  # TypeScript type checking.
  ts-typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm/pkg/

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  # E2E tests with matrix.
  e2e-tests:
    name: E2E Tests (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: wasm-build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm/pkg/

      - name: Install dependencies
        run: npm ci

      - name: Build JS package
        run: cd js && npm run build

      - name: Run E2E tests
        run: npm run test:js

  # Final success gate.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [wasm-build, ts-lint, ts-typecheck, e2e-tests]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.wasm-build.result }}" != "success" ]] || \
             [[ "${{ needs.ts-lint.result }}" != "success" ]] || \
             [[ "${{ needs.ts-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed!"
