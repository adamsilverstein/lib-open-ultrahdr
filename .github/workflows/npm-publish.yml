name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run (no actual publish)'
        type: boolean
        default: false
  release:
    types: [published]

concurrency:
  group: npm-publish
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  EMSDK_VERSION: '4.0.7'

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Install dependencies
        run: npm ci

      - name: Build WASM package (release)
        run: npm run build:wasm:release

      - name: Build JS package
        run: npm run build:js

      - name: Run tests
        run: npm run test:js

      - name: Publish WASM package
        run: |
          cd wasm
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "Dry run: would publish open-ultrahdr-wasm"
            npm publish --dry-run --provenance
          else
            npm publish --provenance
          fi

      - name: Publish JS package
        run: |
          cd js
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "Dry run: would publish open-ultrahdr"
            npm publish --dry-run --provenance
          else
            npm publish --provenance
          fi
